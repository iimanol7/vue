<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
    <div id="app">
        {{msg}}
    </div>
    <script>
        const {createApp} = Vue;
        createApp({
            setup(){
                const msg = "Hola Mundo"
                return {msg}
            }
        }).mount('#app')
    </script>
</body>
</html>
